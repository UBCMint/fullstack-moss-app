name: Code quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUFF_VERSION: "0.8.4" # pin so CI doesn't break on new ruff releases
  RUST_TOOLCHAIN: stable

jobs:
  # ---------- Rust ----------
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        working-directory: backend
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    # lsl-sys vendors an old Boost whose pthread code assumes PTHREAD_STACK_MIN
    # is a compile-time constant (`#if PTHREAD_STACK_MIN > 0`). glibc 2.34+ made
    # it a function call instead, which breaks that preprocessor check on every
    # current Ubuntu runner image (20.04/22.04/24.04 all ship glibc >= 2.34).
    # We patch the vendored header in-place after cargo fetches it (see the
    # "Patch lsl-sys vendored Boost" step below) rather than pinning an OS
    # version, since no currently-supported Ubuntu image avoids this.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config build-essential cmake python3-dev
          version: 1.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fetch
        working-directory: backend
        run: cargo fetch
      - name: Patch lsl-sys vendored Boost (PTHREAD_STACK_MIN fix)
        run: |
          set -euo pipefail
          # Locate the lsl-sys crate source that `cargo fetch` just pulled down.
          HEADER=$(find "$HOME/.cargo/registry/src" -path "*/lsl-sys-*/liblsl/lslboost/boost/thread/pthread/thread_data.hpp" -print -quit)
          if [ -z "$HEADER" ]; then
            echo "::error::Could not locate lsl-sys's thread_data.hpp to patch. Did the crate version or vendor path change?"
            exit 1
          fi
          echo "Patching: $HEADER"
          # glibc >= 2.34 made PTHREAD_STACK_MIN a function call instead of a
          # compile-time constant, which breaks this preprocessor conditional.
          # Force the branch this guards (the >0 case is always true in practice)
          # instead of evaluating the macro at preprocessor time.
          sed -i 's/#if PTHREAD_STACK_MIN > 0/#if 1/' "$HEADER"
          # Fail loudly if the line we expected to patch wasn't actually there,
          # so a future lsl-sys version bump doesn't silently no-op this step.
          if ! grep -q '^#if 1$' "$HEADER"; then
            echo "::error::Patch did not apply — thread_data.hpp may have changed upstream."
            exit 1
          fi
      - name: cargo clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------- Python ----------
  ruff:
    name: ruff (format + check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
      - run: pip install "ruff==${{ env.RUFF_VERSION }}"
      - name: ruff format --check
        run: ruff format --check .
      - name: ruff check
        run: ruff check .

  # ---------- Frontend (Next.js / reactflow) ----------
  frontend-lint:
    name: frontend lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: eslint
        run: npx eslint . # tighten to --max-warnings=0 once the ruleset has been reviewed
      - name: typecheck
        run: npx tsc --noEmit
      - name: prettier --check
        run: npx prettier --check .