name: Code quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUFF_VERSION: "0.8.4" # pin so CI doesn't break on new ruff releases
  RUST_TOOLCHAIN: stable

jobs:
  # ---------- Rust ----------
  rustfmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo fmt --check
        working-directory: backend
        run: cargo fmt --all -- --check

  clippy:
    name: clippy
    # Pinned to 22.04: lsl-sys vendors an old Boost whose pthread code assumes
    # PTHREAD_STACK_MIN is a compile-time constant. Ubuntu 24.04's glibc made it
    # a function call, which breaks the preprocessor check (`#if PTHREAD_STACK_MIN > 0`).
    # Revisit if/when lsl-sys upstream fixes this, or if we vendor a real patched liblsl.
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: pkg-config build-essential cmake python3-dev
          version: 1.0
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: cargo clippy
        working-directory: backend
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------- Python ----------
  ruff:
    name: ruff (format + check)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
      - run: pip install "ruff==${{ env.RUFF_VERSION }}"
      - name: ruff format --check
        run: ruff format --check .
      - name: ruff check
        run: ruff check .

  # ---------- Frontend (Next.js / reactflow) ----------
  frontend-lint:
    name: frontend lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: eslint
        run: npx eslint . # tighten to --max-warnings=0 once the ruleset has been reviewed
      - name: typecheck
        run: npx tsc --noEmit
      - name: prettier --check
        run: npx prettier --check .